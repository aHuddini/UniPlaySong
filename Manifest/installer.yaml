Packages:
  - Version: 1.5.0
    RequiredApiVersion: 6.16.0
    ReleaseDate: 2026-05-10
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.5.0/UniPlaySong-1_5_0-May10_2026.pext'
    Changelog:
      - '[New Feature] Settings Backup tab (Settings -> Backup) — export your UPS configuration to a portable JSON file for backup or migration to another machine. Re-import on the new machine and your audio settings are restored.'
      - '[New Feature] Markdown snapshot export — generate a human-readable .md file of your UPS configuration for sharing in GitHub issues / Discord support requests / personal notes. Includes game-count / music storage stats, tool-path validation, and a "Diff from defaults" table. User-specific paths sanitized to %AppData%-style placeholders for safe sharing.'
      - '[New Feature] Randomize bundled track every startup (Settings -> Playback) — when enabled, UPS picks a random bundled ambient preset at each Playnite startup. Stays consistent across game switches within the session; each new session rolls a fresh pick. Anti-repeat: avoids picking the same preset two sessions in a row.'
      - '[New Feature] Calm Down Mode (Fullscreen Extensions menu) — applies a low-pass filter + volume drop with a smooth 1.5s S-curve fade, useful for late-night browsing. Bindable from theme XAML via {PluginSettings Plugin=UniPlaySong, Path=CalmDownModeEnabled, Mode=TwoWay}. Auto-promotes the player backend to NAudio when toggled on so SDL2 users don''t need to enable Live Effects first.'
  - Version: 1.4.6
    RequiredApiVersion: 6.16.0
    ReleaseDate: 2026-05-09
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.4.6/UniPlaySong-1_4_6-May09_2026.pext'
    Changelog:
      - '[New Format] HES (NEC TurboGrafx-16 / PC Engine) chiptune support — drop a .hes file plus its sibling .m3u into a game''s music folder and UPS plays through every track in the playlist. The .m3u playlist file is REQUIRED.'
      - '[New Feature] "Split HES Tracks" menu action (right-click game -> Chiptunes -> Split HES Tracks) — splits a multi-track .hes into individual mini-HES files, one per track in the M3U. Each mini-HES becomes its own song in UPS, so skip / shuffle / pause / random-pick work track-by-track.'
      - '[New Feature] Two new Bundled Ambient tracks from Mike Aniki (composer of the Aniki ReMake theme): Hub OST and Login OST. Included with explicit permission from Mike Aniki for distribution inside UniPlaySong. Pick from Settings -> Playback -> Default Music Source -> Bundled Ambient.'
      - '[Theme Integration] UPS settings (EnableMusic, EnableDefaultMusic, RadioModeEnabled, PlayOnlyOnGameSelect) are now bindable from theme XAML via Playnite''s {PluginSettings Plugin=UniPlaySong, Path=..., Mode=TwoWay} markup extension. No custom UPS element required in the theme; bindings gracefully no-op when UPS isn''t installed. See docs/dev_docs/THEME_INTEGRATION_GUIDE.md.'
      - '[New Feature] "Enable Game Music" and "Enable Default Music" toggles added to the Fullscreen Extensions menu (Menu -> Extensions -> UniPlaySong). Toggle only Game Music off to leave ambient music playing as a fallback; toggle both off for full silence.'
      - '[Theme Integration] New {PluginSettings} quick-options framework hardened end-to-end against the Aniki ReMake theme. Audio toggles bound from a theme (Enable Game Music, Enable Default Music, Radio Mode, Play Only on Game Select) now react reliably mid-playback, including when no game card is focused, when an overlay clears, or across game switches.'
  - Version: 1.4.5
