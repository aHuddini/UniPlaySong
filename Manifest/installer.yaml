AddonId: 'UniPlaySong.a1b2c3d4-e5f6-7890-abcd-ef1234567890'
Packages:
  - Version: 1.3.6
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-03-09
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.6/UniPlaySong-1_3_6-Mar09_2026.pext'
    Changelog:
      - '[New Setting] Fade Out Before Song End: When Radio Mode or Randomize on Song End is active, music fades out smoothly in the final seconds before auto-advancing to the next track. Configurable duration (1–5s). Enable in Playback tab.'
      - '[Experimental] Icon Glow Reactor: The selected game icon glows with colors extracted from the game art. With Live Effects enabled, the glow pulses in sync with the music beat. Configurable intensity, size, and audio sensitivity. Desktop mode only. Enable in Experimental tab.'
      - '[Experimental] List Icon Glow: Game icons in list/grid view glow when selected or hovered, with color-matched glow extracted from game art. Optional Subtle mode. Smooth fade transitions. Desktop mode only. Enable in Experimental tab.'
  - Version: 1.3.5
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-03-08
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.5/UniPlaySong-1_3_5-Mar08_2026.pext'
    Changelog:
      - '[Improved] Open Music Folder: When right-clicking to open a folder for a game with no music, UPS now prompts to create and open the music folder if it does not exist yet.'
      - '[New Feature] Create Music Folders for All Games: Bulk action in Settings → Editing that creates a music folder for every game in the library that does not have one yet.'
      - '[New Feature] Game Folder Breadcrumbs: When opening a music folder from UPS, each game music folder will contain a named .txt file identifying the game, so manual folder browsing is easier to navigate for users.'
      - '[New Feature] Game Index File: The bulk "Create Music Folders" action generates a _game-index.txt in the music library root listing all games with folders and their IDs.'
      - '[New Feature] Open Game Index: Button in Settings → Editing → File Management opens the game index in your text editor.'
      - '[Backend] Localization Infrastructure Started: Groundwork for community translation support. Not ready now, but contributors can add a language file in the future to help translate UPS into other languages.'
  - Version: 1.3.4
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-02-26
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.4/UniPlaySong-1_3_4-Feb26_2026.pext'
    Changelog:
      - '[Notice] GitHub suspended my repository and account without notice or explanation, jeopardizing the availability of UniPlaySong. To minimize any liabilities to the Playnite ecosystem, certain features have been removed.'
      - '[Removed] Download sources removed to avoid potential DMCA issues.'
      - '[Removed] Bulk Download: "Download Music for All Games" button removed.'
      - '[Removed] Search Hints Online Updates: The search hints database no longer checks for or downloads online updates. Use the bundled database or load a custom file.'
      - '[New Feature] Game Property Filter: Play game-specific music only for games matching selected platforms, genres, or sources. Unmatched games fall through to default music. Configure in Settings → Playback.'
      - '[New Feature] Filter Mode: Play game-specific music only when a Playnite filter is active. Works with criteria-based filters and built-in quick-filter presets (Recently Played, Most Played, etc.). Configure in Settings → Playback.'
      - '[New Feature] Radio Mode: Continuous background music from a fixed pool, ignoring game selection. Four sources: Full Library, Custom Folder, Custom Game Rotation, Completion Status Pool. Overrides game-specific and default music while active.'
      - '[Changed] External Audio Pause Default: "Pause on external audio" is now disabled by default. Re-enable in Settings → Pauses if desired.'
