AddonId: 'UniPlaySong.a1b2c3d4-e5f6-7890-abcd-ef1234567890'
Packages:
  - Version: 1.4.1
    RequiredApiVersion: 6.16.0
    ReleaseDate: 2026-04-18
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.4.1/UniPlaySong-1_4_1-Apr18_2026.pext'
    Changelog:
      - '[New Feature] Fanfare on Beaten: New option to also play the completion fanfare when a game is marked as Beaten (in addition to Completed). Off by default; enable it in Settings -> Playback -> Gamification.'
      - '[New Feature] Abandoned Status Jingle + Toast: New parallel pipeline for the Abandoned completion status with its own sound, its own muted toast palettes (Tombstone / Dusk Blue / Rust / Ash / Faded Crimson / Shadow), and a customizable message. Ships with 10 bundled failure-themed jingles (MK fatalities, Shinobi failure, Streets of Rage Game Over, Toilet Flush, etc.). Off by default.'
      - '[Critical Fix] Retro Chiptune Pause/Resume: Fixed three overlapping issues with VGM/VGZ playback - multi-second Playnite UI freezes on resume (sometimes long enough to trigger "not responding"), silent main music after celebration jingles, and stuck audio after rapid pause/resume cycles. Resume is now near-instant with a clean fade-in; pause, external audio, focus loss, and jingles all behave correctly.'
      - '[Fix] Play Only on Game Select: Randomization now fires on every Details-view entry. Previously the first alphabetical song played every time (repeat entries into the same game would replay that same track until auto-advance kicked in).'
      - '[Fix] Single-Track Loop Silent: If a game had only one song and "Fade out before song end" was enabled, the song would loop but play silently until manually paused and resumed. Fixed for all audio file formats.'
      - '[Fix] Song-End Fade Silent Gap: "Fade out before song end" now fades the song out over the exact duration you set, ending at the song''s natural end. Previously the fade finished several seconds early, leaving a silent gap before the next song.'
      - '[Performance] Play Only on Game Select: Reacts instantly to List ↔ Details view changes now via a Playnite SDK 6.16 event. Previous implementation polled every 200ms, consuming unneccesary CPU.'
      - '[GUI] About Tab: Added a Supported Audio Formats section listing MP3, OGG, FLAC, WAV and clarifying VGM/VGZ scope (Sega Genesis / Mega Drive / Sega CD).'
      - '[Dev] Jingle playback internals refactored for maintainability. No user-visible change.'
  - Version: 1.4.0
    RequiredApiVersion: 6.16.0
    ReleaseDate: 2026-04-16
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.4.0/UniPlaySong-1_4_0-Apr16_2026.pext'
    Changelog:
      - '[New Feature] Retro Chiptune Music Support: UniPlaySong now plays .vgm chiptune files from Sega Genesis / Mega Drive! Perfect for your ROM / emulated game library. Drop a .vgm into a game''s music folder and they just work, with full fade, volume, and visualizer support.'
      - '[Performance] Faster Previews: YouTube audio previews now download only the first 40 seconds instead of the full length. Reduces bandwidth and wait times.'
      - '[New Feature] Browser Cookies: Added Chrome, Edge, Brave, and Opera cookie support alongside Firefox for YouTube downloads.'
      - '[Fix] Source Downloads: Cookie mode now uses best audio quality and consistent settings across all download modes.'
      - '[Improved] License Attribution: Added Game Music Emu (LGPL, dynamic linking) and zlib credits for the new retro music feature. Cleaned up LICENSE document.'
  - Version: 1.3.12
    RequiredApiVersion: 6.16.0
    ReleaseDate: 2026-04-13
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.12/UniPlaySong-1_3_12-Apr13_2026.pext'
    Changelog:
      - '[Critical Fix] Normalization Codec: Now auto-detects correct codec for OGG, FLAC, WAV files. Previously encoded everything as MP3. Quality preserved with high-quality VBR settings.'
      - '[Critical Fix] External Audio Pause: Fixed detection of other apps audio. Replaced NAudio COM with direct WASAPI interop to resolve InvalidCastException.'
      - '[Fix] Radio Mode: No longer plays over fullscreen theme login/welcome screens. Respects theme overlay pauses.'
      - '[Fix] Radio Mode + Installed Games: These options now work together properly with smooth fade transitions.'
      - '[Fix] Silence Trim: Added OGG codec support for silence trim operations.'
      - '[Fix Attempt] Fullscreen Download Dialog: Back navigation no longer shows misleading error messages. Visual fix only — download functionality unaffected.'
      - '[Improved] Tool Path Validation: yt-dlp and FFmpeg paths now show Found/Not Found status. Descriptions clarify .exe path requirement and Deno placement.'
      - '[GUI] Theme Compatible Login Skip: Clarified this option is only needed for themes without native UPS support.'
  - Version: 1.3.11
    RequiredApiVersion: 6.16.0
    ReleaseDate: 2026-04-11
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.11/UniPlaySong-1_3_11-Apr11_2026.pext'
    Changelog:
      - '[New Feature] Active Theme Music: New default music option that plays your fullscreen themes background.mp3 through UPS with fade-in, volume control, and no audio conflicts. Requires theme to have background.mp3 in its audio directory.'
      - '[New Feature] Add Music File: Browse and add local audio files to any game from the Desktop right-click menu. Also includes a controller-friendly file browser in Fullscreen mode.'
      - '[Fix] Skip First Selection: Do not play music on startup no longer requires two game selections before music plays.'
      - '[Improved] Updated to Playnite SDK 6.16.0 (Playnite 10.52).'
  - Version: 1.3.10
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-03-29
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.10/UniPlaySong-1_3_10-Mar29_2026.pext'
    Changelog:
      - '[New Feature] Bulk Audio Format Conversion: Convert all music files to OGG or MP3 at 128/192/256 kbps. Settings > Editing > Bulk Actions.'
      - '[Fix] NAudio Restart: Restarting a song now correctly seeks to the beginning when using Live Effects or Visualizer.'
      - '[Fix] NAudio Instant Pause: External Audio instant pause now properly silences audio when Live Effects or Visualizer is enabled.'
      - '[Performance] Fullscreen Optimization: Visual effects (color extraction, icon glow) now skipped in Fullscreen mode. External audio poll timer only runs when the setting is enabled.'
      - '[New Feature] External Control Support: External applications, scripts, themes, and automation tools can now control UniPlaySong via Playnite URI protocol. Playnite must be running for the URI commands to work.'
      - '[New URI Command] — Play/Resume: playnite://uniplaysong/play'
      - '[New URI Command] — Pause: playnite://uniplaysong/pause'
      - '[New URI Command] — Toggle Play/Pause: playnite://uniplaysong/playpausetoggle'
      - '[New URI Command] — Skip to Next Song: playnite://uniplaysong/skip'
      - '[New URI Command] — Restart Current Song: playnite://uniplaysong/restart'
      - '[New URI Command] — Stop Playback: playnite://uniplaysong/stop'
      - '[New URI Command] — Set Volume (0-100): playnite://uniplaysong/volume/{value}'
  - Version: 1.3.9
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-03-28
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.9/UniPlaySong-1_3_9-Mar28_2026.pext'
    Changelog:
      - '[New Feature] Play Only on Game Select: In Fullscreen mode, default music plays while browsing. Game music only plays when you open a games detail view. Reverts automatically when returning to the grid.'
      - '[Notice] Controller input has been migrated from XInput to Playnite SDK (SDL2). This is a major refactor. If you experience controller issues in Fullscreen mode, please report them on GitHub.'
      - '[Refactor] Controller SDK Migration: Transitioned from XInput polling to Playnite SDK SDL2 event-driven input. All controllers (Xbox, PlayStation, Switch Pro, generic) are now supported for UPS Fullscreen functionality.'
      - '[Improved] Faster D-Pad Navigation: Reduced debounce from 300ms to 150ms for snappier scrolling in all controller dialogs.'
      - '[Fix] Amplify Dialog: Music now continues playing after amplifying a song and closing the dialog.'
      - '[Fix] Delete Dialog: B button no longer triggers unwanted delete confirmation when closing.'
      - '[Fix] OGG Audio Editing: Amplify and Trim audio features now fully support .ogg format (waveform loading, gain adjustment, trimming).'
      - '[Fix] Confirmation Dialog: Rounded button styles and proper D-pad focus navigation.'
