  - Version: 1.4.4
    RequiredApiVersion: 6.16.0
    ReleaseDate: 2026-04-20
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.4.4/UniPlaySong-1_4_4-Apr20_2026.pext'
    Changelog:
      - '[New Format] SNES Music (.spc): SNES / Super Famicom .spc audio files are officially supported! Drop a .spc file into a game''s music folder and it plays alongside MP3s, FLACs, and other chiptune formats.'
      - '[Fix Attempt] Desktop YouTube previews failing on some systems: Previews and downloads from YouTube now use the same AppData location as Fullscreen does, ensuring consistent, safe behavior.'
      - '[Fix Attempt] yt-dlp errors no longer silently suppressed for previews under no-cookie mode: When using no-cookie mode and a YouTube preview fails, the underlying yt-dlp error (bot detection, missing JS runtime, corrupted install, etc.) is now visible in extensions.log.'
  - Version: 1.4.3
    RequiredApiVersion: 6.16.0
    ReleaseDate: 2026-04-19
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.4.3/UniPlaySong-1_4_3-Apr19_2026.pext'
    Changelog:
      - '[New Format] NES Music (.nsf): NES / Famicom soundtracks are officially supported! Drop an .nsf file into a game''s music folder and it plays alongside MP3s, FLACs, and other chiptune formats. Sound effects and other jingles bundled inside the .nsf work too.'
      - '[New Feature] NSF Manager: .nsf files are album-like — a single file holds every song AND sound effect from the game. Right-click a game -> Chiptunes -> NSF Management (Desktop) to open a master .nsf like a playlist, preview each track, and split the ones you want into individual mini-.nsf files.'
      - '[New Feature] NSF Loop Editor: Edit Loops tab: Set a custom loop length (in seconds) for any individual .nsf in a game''s folder. Use the -/+ buttons or type directly. Empty field = default 2:30. Great for trimming repetitive NES BGM tracks whose actual musical content is only 20-30 seconds long.'
      - '[New Feature] True Crossfade (DJ-style overlap): New Settings -> Playback toggle with 1-10s duration slider (default 9s). Auto-advance transitions (Radio Mode / Randomize on Song End / pool-based default music) overlap the next song in parallel instead of the sequential fade-out. Forces NAudio backend.'
      - '[New Setting] Automatic Playback on First Launch (Desktop): New Settings -> General checkbox, ON by default. When unchecked, automatic playback is disabled in Desktop until you manually press Play. After the first manual Play, game switches automatically play music for the rest of the session. Resets on Playnite restart.'
      - '[Note] NSF Track Lengths: Songs inside .nsf files don''t carry length metadata, so they play for up to 2:30 before looping. Short jingles and stingers are auto-detected and advance as soon as they finish. For everything in between, use the Edit Loops tab to dial in a custom length.'
      - '[Fix] Auto-play setting honored after toggling Live Effects / Visualizer / True Crossfade: If Automatic Playback on First Launch was off and you had already pressed Play once, changing any of those three settings caused UPS to stop auto-playing music on future game selections until you pressed Play again. Now playback continues as expected.'
      - '[Improved] Play Music State dropdown (Settings -> General): Desktop and Fullscreen options renamed to "Desktop Only" and "Fullscreen Only" for clarity. Description updated to guide users on how to disable auto-playback in Desktop mode (set to "Fullscreen Only"). No behavior change.'
      - '[Improved] YouTube download error diagnosis: If yt-dlp.exe fails to launch due to a corrupted install (missing or mismatched Python DLL from a zip-distributed release), UPS now logs a clear fix — re-download the single-file yt-dlp.exe from the official releases page.'
  - Version: 1.4.2
