Packages:
  - Version: 1.3.10
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-03-29
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.10/UniPlaySong-1_3_10-Mar29_2026.pext'
    Changelog:
      - '[New Feature] Bulk Audio Format Conversion: Convert all music files to OGG or MP3 at 128/192/256 kbps. Settings > Editing > Bulk Actions.'
      - '[Fix] NAudio Restart: Restarting a song now correctly seeks to the beginning when using Live Effects or Visualizer.'
      - '[Fix] NAudio Instant Pause: External Audio instant pause now properly silences audio when Live Effects or Visualizer is enabled.'
      - '[Performance] Fullscreen Optimization: Visual effects (color extraction, icon glow) now skipped in Fullscreen mode. External audio poll timer only runs when the setting is enabled.'
      - '[New Feature] External Control Support: External applications, scripts, themes, and automation tools can now control UniPlaySong via Playnite URI protocol. Playnite must be running for the URI commands to work.'
      - '[New URI Command] — Play/Resume: playnite://uniplaysong/play'
      - '[New URI Command] — Pause: playnite://uniplaysong/pause'
      - '[New URI Command] — Toggle Play/Pause: playnite://uniplaysong/playpausetoggle'
      - '[New URI Command] — Skip to Next Song: playnite://uniplaysong/skip'
      - '[New URI Command] — Restart Current Song: playnite://uniplaysong/restart'
      - '[New URI Command] — Stop Playback: playnite://uniplaysong/stop'
      - '[New URI Command] — Set Volume (0-100): playnite://uniplaysong/volume/{value}'
  - Version: 1.3.9
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-03-28
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.9/UniPlaySong-1_3_9-Mar28_2026.pext'
    Changelog:
      - '[New Feature] Play Only on Game Select: In Fullscreen mode, default music plays while browsing. Game music only plays when you open a games detail view. Reverts automatically when returning to the grid.'
      - '[Notice] Controller input has been migrated from XInput to Playnite SDK (SDL2). This is a major refactor. If you experience controller issues in Fullscreen mode, please report them on GitHub.'
      - '[Refactor] Controller SDK Migration: Transitioned from XInput polling to Playnite SDK SDL2 event-driven input. All controllers (Xbox, PlayStation, Switch Pro, generic) are now supported for UPS Fullscreen functionality.'
      - '[Improved] Faster D-Pad Navigation: Reduced debounce from 300ms to 150ms for snappier scrolling in all controller dialogs.'
      - '[Fix] Amplify Dialog: Music now continues playing after amplifying a song and closing the dialog.'
      - '[Fix] Delete Dialog: B button no longer triggers unwanted delete confirmation when closing.'
      - '[Fix] OGG Audio Editing: Amplify and Trim audio features now fully support .ogg format (waveform loading, gain adjustment, trimming).'
      - '[Fix] Confirmation Dialog: Rounded button styles and proper D-pad focus navigation.'
  - Version: 1.3.8
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-03-24
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.8/UniPlaySong-1_3_8-Mar24_2026.pext'
    Changelog:
      - '[Playback Fix] OGG Vorbis Support: OGG files are now properly recognized and plays properly with non-Live Effects and Live Effects enabled.'
      - '[Settings Fix] Open Log Folder Button: Button no longer crashes on non-standard Playnite installs (portable, AppData\Local). Uses actual extension location instead of hardcoded path.'
      - '[Critical Fix, Theme Compatibility] Attempt to prevent UPS Music from being blocked by certain themes: Themes that set certain flags during app startup appears to permanently block automatic music playback for UPS users.'
      - '[Improved] External Audio Detection: Wallpaper Engine processes now excluded by default under "Pause on External Audio" setting. Thread safety also improved for mode switches.'
  - Version: 1.3.7
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-03-15
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.7/UniPlaySong-1_3_7-Mar15_2026.pext'
    Changelog:
      - '[Critical Fix] Live Effects Toggle: Turning off Live Effects now properly disables all audio effects (reverb, chorus, etc.) even when the Visualizer or Peak Meter keeps NAudio active.'
  - Version: 1.3.6
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-03-09
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.6/UniPlaySong-1_3_6-Mar09_2026.pext'
    Changelog:
      - '[Experimental] Music Library Dashboard (Desktop): Browse your game music library from a sidebar page. Game grid, track listings, search, radio mode, and now-playing view with its own audio player.'
      - '[New Setting] Fade Out Before Song End: Smooth fade-out before auto-advancing to the next track. Configurable 1–5s. Playback tab.'
      - '[Experimental] Icon Glow (Desktop): Selected game icon glows with colors from game art. Pulses with music when Live Effects is on. Desktop only.'
      - '[Experimental] List Icon Glow (Desktop): Game icons glow when selected or hovered in list/grid view. Optional Subtle mode. Desktop only.'
      - '[Experimental] Sidebar Visualizer Effects (Desktop): 22 audio-reactive animations for the sidebar. Includes DNA Helix, Laser, Voronoi, Snow, Neon Line, and more. Desktop only.'
      - '[Improved] Pause on External Audio: Improved reliability of external audio detection. Better error handling and diagnostic logging.'
  - Version: 1.3.5
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-03-08
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.5/UniPlaySong-1_3_5-Mar08_2026.pext'
    Changelog:
      - '[Improved] Open Music Folder: When right-clicking to open a folder for a game with no music, UPS now prompts to create and open the music folder if it does not exist yet.'
      - '[New Feature] Create Music Folders for All Games: Bulk action in Settings → Editing that creates a music folder for every game in the library that does not have one yet.'
      - '[New Feature] Game Folder Breadcrumbs: When opening a music folder from UPS, each game music folder will contain a named .txt file identifying the game, so manual folder browsing is easier to navigate for users.'
      - '[New Feature] Game Index File: The bulk "Create Music Folders" action generates a _game-index.txt in the music library root listing all games with folders and their IDs.'
      - '[New Feature] Open Game Index: Button in Settings → Editing → File Management opens the game index in your text editor.'
      - '[Backend] Localization Infrastructure Started: Groundwork for community translation support. Not ready now, but contributors can add a language file in the future to help translate UPS into other languages.'
  - Version: 1.3.4
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-02-26
    PackageUrl: 'https://github.com/aHuddini/UniPlaySong/releases/download/1.3.4/UniPlaySong-1_3_4-Feb26_2026.pext'
    Changelog:
      - '[Notice] GitHub suspended my repository and account without notice or explanation, jeopardizing the availability of UniPlaySong. To minimize any liabilities to the Playnite ecosystem, certain features have been removed.'
      - '[Removed] Download sources removed to avoid potential DMCA issues.'
      - '[Removed] Bulk Download: "Download Music for All Games" button removed.'
      - '[Removed] Search Hints Online Updates: The search hints database no longer checks for or downloads online updates. Use the bundled database or load a custom file.'
      - '[New Feature] Game Property Filter: Play game-specific music only for games matching selected platforms, genres, or sources. Unmatched games fall through to default music. Configure in Settings → Playback.'
      - '[New Feature] Filter Mode: Play game-specific music only when a Playnite filter is active. Works with criteria-based filters and built-in quick-filter presets (Recently Played, Most Played, etc.). Configure in Settings → Playback.'
      - '[New Feature] Radio Mode: Continuous background music from a fixed pool, ignoring game selection. Four sources: Full Library, Custom Folder, Custom Game Rotation, Completion Status Pool. Overrides game-specific and default music while active.'
      - '[Changed] External Audio Pause Default: "Pause on external audio" is now disabled by default. Re-enable in Settings → Pauses if desired.'
