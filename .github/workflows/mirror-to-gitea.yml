name: Mirror to Gitea

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (bare clone)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to Gitea
        run: |
          git remote add gitea https://aHuddini:${{ secrets.GITEA_TOKEN }}@gitea.com/aHuddini/UniPlaySong.git
          git push gitea --branches
          git push gitea --tags
